spring:
  application:
    name: gateway
  security:
    oauth2:
      client:
        provider:
          keycloak-provider:
            issuer-uri: http://localhost:8082/realms/DigitalMedia
        registration:
          api-gateway:
            provider: keycloak-provider
            client-id: api-gateway
            client-secret: Q55UgdASGhLUGATnPdwPxHkJAbabaSEL
            authorization-grant-type: authorization_code
            redirect-uri: 'http://localhost:8080/login/oauth2/code/keycloak'
  eureka:
    client:
      registerWithEureka: false
      fetchRegistry: true
      serviceURL:
        defaultZone: http://localhost:8761/eureka
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
      default-filters:
        - TokenRelay
      routes:
        - id: movies-service
          uri: http://localhost:8085/
          predicates:
            - Path= /movies/**
        - id: users-service
          uri: lb://users-service
          predicates:
            - Path= /user

server:
  port: 8080